
cat > .github/workflows/deploy.yml << 'EOF'



name: Auto Deploy Docker
on:
  push:
    branches: [ main ]
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build Backend
      run: docker build -f Dockerfile.backend -t YOUR_USERNAME/fastapi-social:backend .
    - name: Push Backend
      run: docker push YOUR_USERNAME/fastapi-social:backend

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build Frontend
      run: docker build -f Dockerfile.frontend -t YOUR_USERNAME/fastapi-social:frontend .
    - name: Push Frontend
      run: docker push snehashreehazra/fastapi-social:frontend
